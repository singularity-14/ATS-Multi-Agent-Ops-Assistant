name: CI — ATS Multi-Agent Ops Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting dependencies
        run: pip install black ruff mypy

      - name: Check formatting (black)
        run: black --check --diff src/ tests/
        continue-on-error: true   # formatting is advisory, not a hard gate

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          echo 'NVIDIA_API_KEY=test_key_for_unit_tests' > .env
          echo 'APP_ENV=test' >> .env
          echo 'LOG_LEVEL=WARNING' >> .env

      # Override pyproject.toml addopts so --cov flags don't interfere
      - name: Run unit tests (no LLM calls)
        run: |
          pytest tests/test_safety.py tests/test_mcp_servers.py tests/test_evaluation.py \
            -v --override-ini="addopts=" \
            --cov=src --cov-report=xml --cov-report=term-missing \
            -k 'not llm and not nvidia'

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ats-agentic-ops:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-container \
            -e NVIDIA_API_KEY=test_key \
            -p 8000:8000 \
            ats-agentic-ops:${{ github.sha }} \
            python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
          sleep 5
          docker stop test-container
          docker rm test-container
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run security scan (bandit)
        run: bandit -r src/ -ll --format txt
        continue-on-error: true
